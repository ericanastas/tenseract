<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tenseract</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
    #overlay {
      position: fixed; top: 12px; left: 12px;
      color: #ccc; font: 13px/1.6 monospace;
      pointer-events: none;
      text-shadow: 0 0 4px #000;
    }
    #controls {
      position: fixed; 
      bottom: 16px; 
      display: flex; gap: 8px;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    #controls button {
      background: rgba(0,0,0,0.6);
      color: #aaa;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 7px 14px;
      font: 13px monospace;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      width: 150px;
      height: 60px;
    }
    #controls button:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-color: #888;
    }
    #controls button.active {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border-color: #ccc;
    }
  </style>
</head>
<body>
  <div id="overlay"></div>
  <div id="controls">
    <button id="btn-orbit" class="active">[O]rbit: auto</button>
    <button id="btn-bloom" class="active">[B]loom: on</button>
    <button id="btn-labels">[P]oint Labels: off</button>
    <button id="btn-dust">[D]ust: off</button>
    <button id="btn-light">[L]ight: dawn</button>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Constants (1 unit = 1 foot) ---
    const CUBE_SIZE = 5;
    const POLE_RADIUS = 0.5 / 12 / 2; // 0.5 inch diameter → radius in feet
    const OUTER_LIGHTS_PER_EDGE = 43;
    const INNER_LIGHTS_PER_EDGE = 19;
    const LIGHT_RADIUS = 0.04; // ~1 inch diameter sphere
    const POLE_TWIST_ANGLE = 25 * Math.PI / 180;
    const POLE_INWARD_FACTOR = 0.31; // 0 = no movement, 1 = fully at center

    // --- Scene ---
    const scene = new THREE.Scene();

    // --- Skybox ---
    new THREE.TextureLoader().load('Playa_Sunrise_8k.jpg', (tex) => {
      tex.mapping = THREE.EquirectangularReflectionMapping;
      scene.background = tex;
      scene.backgroundIntensity = 0.05;
    });

    // Ground texture is applied after ground mesh is created (see below)

    // --- Camera ---
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(8, 6, 15);

    // --- Renderer ---
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- Post-processing: Unreal Bloom ---
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
       2,   // strength
       1,   // radius
       0.2    // threshold
    );
    composer.addPass(bloomPass);

    // --- Controls ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0); // updated below once outerCenterY is known
    controls.enablePan = false;
    controls.maxPolarAngle = Math.PI / 2;
    controls.autoRotate = true;
    controls.autoRotateSpeed = -2;
    controls.update();

    let autoOrbit = true;
    controls.addEventListener('start', () => {
      autoOrbit = false;
      controls.autoRotate = false;
      updateButtons();
    });

    function updateButtons() {
      const btnOrbit = document.getElementById('btn-orbit');
      btnOrbit.textContent = `[O]rbit: ${autoOrbit ? 'auto' : 'manual'}`;
      btnOrbit.classList.toggle('active', autoOrbit);
      const btnBloom = document.getElementById('btn-bloom');
      btnBloom.textContent = `[B]loom: ${bloomPass.enabled ? 'on' : 'off'}`;
      btnBloom.classList.toggle('active', bloomPass.enabled);
      const btnLabels = document.getElementById('btn-labels');
      btnLabels.textContent = `[P]oint Labels: ${labelsVisible ? 'on' : 'off'}`;
      btnLabels.classList.toggle('active', labelsVisible);
      const btnDust = document.getElementById('btn-dust');
      btnDust.textContent = `[D]ust: ${windVisible ? 'on' : 'off'}`;
      btnDust.classList.toggle('active', windVisible);
      const btnLight = document.getElementById('btn-light');
      btnLight.textContent = `[L]ight: ${lightLevels[lightLevelIndex].label}`;
    }

    document.getElementById('btn-orbit').addEventListener('click', () => {
      autoOrbit = !autoOrbit;
      controls.autoRotate = autoOrbit;
      updateButtons();
    });
    document.getElementById('btn-bloom').addEventListener('click', () => {
      bloomPass.enabled = !bloomPass.enabled;
      updateButtons();
    });
    document.getElementById('btn-light').addEventListener('click', () => {
      lightLevelIndex = (lightLevelIndex + 1) % lightLevels.length;
      applyLightLevel(lightLevelIndex);
      updateButtons();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'o' || e.key === 'O') {
        autoOrbit = !autoOrbit;
        controls.autoRotate = autoOrbit;
        updateButtons();
      }
      if (e.key === 'b' || e.key === 'B') {
        bloomPass.enabled = !bloomPass.enabled;
        updateButtons();
      }
      if (e.key === 'l' || e.key === 'L') {
        lightLevelIndex = (lightLevelIndex + 1) % lightLevels.length;
        applyLightLevel(lightLevelIndex);
        updateButtons();
      }
    });

    // --- Resize handler ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Scene lighting ---
    //scene.add(new THREE.AmbientLight(0x404040, 0.01));
    const dirLight = new THREE.DirectionalLight(0xffffff, .08);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // --- Light level presets: [dirLight intensity, backgroundIntensity, label] ---
    const lightLevels = [
      { dir: 0.11,  bg: 0.06,  label: 'dawn'   },
      { dir: 0.02, bg: 0.01, label: 'night' }
    ];

    let lightLevelIndex = 0;
    function applyLightLevel(idx) {
      const lvl = lightLevels[idx];
      dirLight.intensity = lvl.dir;
      scene.backgroundIntensity = lvl.bg;
    }
    applyLightLevel(0);

    // --- Shared geometry and materials ---
    const poleMaterial = new THREE.MeshStandardMaterial({
      color: 0x888888,
      metalness: 0.7,
      roughness: 0.3
    });
    const sphereGeometry = new THREE.SphereGeometry(LIGHT_RADIUS, 12, 8);
    const lightSpheres = [];
    const realLights = [];
    const poleEndpoints = []; // { position, index } — populated by buildEdge

    // Direction groups: each stores arrays of poles, where each pole is an array of sphere indices
    // 'vertical' (Y), 'leftright' (X), 'frontback' (Z), 'diagonal'
    function makeDirGroups() {
      return {
        vertical:  { poles: [], realLightPoles: [] },
        leftright: { poles: [], realLightPoles: [] },
        frontback: { poles: [], realLightPoles: [] },
        diagonal:  { poles: [], realLightPoles: [] },
      };
    }
    const outerDirGroups = makeDirGroups();
    const innerDirGroups = makeDirGroups();

    // --- Function to build a single edge (pole + lights) and tag its direction ---
    function buildEdge(a, b, direction, groups, cubeCenter, lightsPerEdge) {
      // Rotate endpoints 10° about the axis from the pole midpoint toward the cube center
      const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
      if (cubeCenter) {
        const rotAxis = new THREE.Vector3().subVectors(cubeCenter, mid).normalize();
        const rotQuat = new THREE.Quaternion().setFromAxisAngle(rotAxis, POLE_TWIST_ANGLE);
        a = a.clone().sub(mid).applyQuaternion(rotQuat).add(mid);
        b = b.clone().sub(mid).applyQuaternion(rotQuat).add(mid);
        // Translate the whole pole inward toward the cube center
        const inward = new THREE.Vector3().subVectors(cubeCenter, mid).multiplyScalar(POLE_INWARD_FACTOR);
        a = a.add(inward);
        b = b.add(inward);
        mid.add(inward);
      }
      // Record endpoints with sequential indices
      poleEndpoints.push({ position: a.clone(), index: poleEndpoints.length });
      poleEndpoints.push({ position: b.clone(), index: poleEndpoints.length });

      const dir = new THREE.Vector3().subVectors(b, a);
      const length = dir.length();

      const edgePoleGeo = new THREE.CylinderGeometry(POLE_RADIUS, POLE_RADIUS, length, 16);
      const pole = new THREE.Mesh(edgePoleGeo, poleMaterial);
      pole.position.copy(mid);
      const axis = new THREE.Vector3(0, 1, 0);
      const quat = new THREE.Quaternion().setFromUnitVectors(axis, dir.clone().normalize());
      pole.quaternion.copy(quat);
      scene.add(pole);

      const group = groups[direction];
      const poleIndices = [];

      for (let i = 0; i < lightsPerEdge; i++) {
        const material = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, depthWrite: false });
        const sphere = new THREE.Mesh(sphereGeometry, material);
        const t = i / (lightsPerEdge - 1);
        sphere.position.lerpVectors(a, b, t);
        scene.add(sphere);
        lightSpheres.push(sphere);
        poleIndices.push(lightSpheres.length - 1);
      }
      group.poles.push(poleIndices);

      const poleRealLights = [];
      const REAL_LIGHTS_PER_EDGE = 3;
      for (let i = 0; i < REAL_LIGHTS_PER_EDGE; i++) {
        const t = (i + 0.5) / REAL_LIGHTS_PER_EDGE;
        const pointLight = new THREE.PointLight(0xffffff, 0.5, 8, 3);
        pointLight.position.lerpVectors(a, b, t);
        scene.add(pointLight);
        realLights.push(pointLight);
        poleRealLights.push({ light: pointLight, posInPole: Math.floor(t * (lightsPerEdge - 1)) });
      }
      group.realLightPoles.push(poleRealLights);
    }

    // --- Function to build a cube frame with lights ---
    function buildCube(size, centerY, groups, cubeCenter, lightsPerEdge) {
      const half = size / 2;
      const bottomY = centerY - size / 2;
      const topY = centerY + size / 2;

      const corners = [
        new THREE.Vector3(-half, bottomY, -half),
        new THREE.Vector3( half, bottomY, -half),
        new THREE.Vector3( half, bottomY,  half),
        new THREE.Vector3(-half, bottomY,  half),
        new THREE.Vector3(-half, topY, -half),
        new THREE.Vector3( half, topY, -half),
        new THREE.Vector3( half, topY,  half),
        new THREE.Vector3(-half, topY,  half),
      ];

      // Left/Right edges (X-axis): [0,1], [3,2], [4,5], [7,6]
      // Front/Back edges (Z-axis): [1,2], [0,3], [5,6], [4,7]
      // Vertical edges (Y-axis): [0,4], [1,5], [2,6], [3,7]
      const edgesWithDir = [
        [[0, 1], 'leftright'], [[3, 2], 'leftright'], [[4, 5], 'leftright'], [[7, 6], 'leftright'],
        [[0, 3], 'frontback'], [[1, 2], 'frontback'], [[4, 7], 'frontback'], [[5, 6], 'frontback'],
        [[0, 4], 'vertical'],  [[1, 5], 'vertical'],  [[2, 6], 'vertical'],  [[3, 7], 'vertical'],
      ];

      for (const [[ai, bi], direction] of edgesWithDir) {
        buildEdge(corners[ai], corners[bi], direction, groups, cubeCenter, lightsPerEdge);
      }
    }

    // --- Helper to get cube corners ---
    function getCubeCorners(size, centerY) {
      const half = size / 2;
      const bottomY = centerY - size / 2;
      const topY = centerY + size / 2;
      return [
        new THREE.Vector3(-half, bottomY, -half),
        new THREE.Vector3( half, bottomY, -half),
        new THREE.Vector3( half, bottomY,  half),
        new THREE.Vector3(-half, bottomY,  half),
        new THREE.Vector3(-half, topY, -half),
        new THREE.Vector3( half, topY, -half),
        new THREE.Vector3( half, topY,  half),
        new THREE.Vector3(-half, topY,  half),
      ];
    }

    // Pre-compute net Y displacement of the lower corner after BOTH rotation and inward translation.
    // Both transformations are translation-invariant in Y, so bottomY=0 is a valid reference.
    const _h = CUBE_SIZE / 2;
    const _refMid    = new THREE.Vector3(0,  0,  -_h);
    const _refCenter = new THREE.Vector3(0, _h,   0);
    const _refCorner = new THREE.Vector3(-_h, 0, -_h);
    const _refAxis   = new THREE.Vector3().subVectors(_refCenter, _refMid).normalize();
    const _refQuat   = new THREE.Quaternion().setFromAxisAngle(_refAxis, POLE_TWIST_ANGLE);
    const _refRotated = _refCorner.clone().sub(_refMid).applyQuaternion(_refQuat).add(_refMid);
    const _refInward  = new THREE.Vector3().subVectors(_refCenter, _refMid).multiplyScalar(POLE_INWARD_FACTOR);
    const CORNER_NET_LIFT = _refRotated.y + _refInward.y; // net Y when bottomY=0 (may be + or -)

    // Set outerCenterY so lower corners land at exactly PEDESTAL_TIP_HEIGHT above ground:
    //   bottomY + CORNER_NET_LIFT = PEDESTAL_TIP_HEIGHT  →  bottomY = PEDESTAL_TIP_HEIGHT - CORNER_NET_LIFT
    const PEDESTAL_TIP_HEIGHT = 11 / 12; // 11 inches
    const outerCenterY = (PEDESTAL_TIP_HEIGHT - CORNER_NET_LIFT) + CUBE_SIZE / 2;
    controls.target.set(0, outerCenterY, 0);
    const cubeCenter = new THREE.Vector3(0, outerCenterY, 0);
    buildCube(CUBE_SIZE, outerCenterY, outerDirGroups, cubeCenter, OUTER_LIGHTS_PER_EDGE);

    // --- Build inner cube (2.5', centered in outer cube) ---
    buildCube(CUBE_SIZE / 2, outerCenterY, innerDirGroups, cubeCenter, INNER_LIGHTS_PER_EDGE);


    // Direction group cycle order — each pair shares the same edges, reversed flag flips particle direction
    const groupDefs = [
      { name: 'vertical',  baseDir: 'vertical',  reversed: false },
      { name: 'down',      baseDir: 'vertical',  reversed: true  },
      { name: 'leftright', baseDir: 'leftright', reversed: false },
      { name: 'rightleft', baseDir: 'leftright', reversed: true  },
      { name: 'frontback', baseDir: 'frontback', reversed: false },
      { name: 'backfront', baseDir: 'frontback', reversed: true  },
    ];
    const groupNames = groupDefs.map(g => g.name);
    const SWITCH_INTERVAL = 3; // seconds per direction

    // --- Pedestals: tip at each rotated lower corner, base (5"x5") at ground (Y=0) ---
    {
      const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.3, roughness: 0.7 });
      const baseRadius = (6 / 12) / Math.sqrt(2); // circumradius for a 6"x6" square
      // Use the actual built endpoint positions (populated by buildCube above) so tips
      // are guaranteed to align exactly with the pole endpoints.
      // Indices 0, 3, 9, 10 are the lower endpoints of the 4 base horizontal poles.
      for (const idx of [0, 3, 9, 10]) {
        const tip = poleEndpoints[idx].position;
        const geo = new THREE.CylinderGeometry(0, baseRadius, PEDESTAL_TIP_HEIGHT, 4);
        const mesh = new THREE.Mesh(geo, pedestalMat);
        mesh.position.set(tip.x, PEDESTAL_TIP_HEIGHT / 2, tip.z);
        mesh.rotation.y = Math.PI / 4;
        scene.add(mesh);
      }
    }

    // --- Pole endpoint index labels ---
    function makeEndpointLabel(idx, position) {
      const size = 128;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${size * 0.45}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(idx), size/2, size/2);
      const tex = new THREE.CanvasTexture(canvas);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
      sprite.position.copy(position);
      sprite.scale.set(0.35, 0.35, 1);
      scene.add(sprite);
      return sprite;
    }

    const endpointLabels = poleEndpoints.map(ep => makeEndpointLabel(ep.index, ep.position));

    // --- Neon green connector poles ---
    let greenMat;
    {
      greenMat = new THREE.MeshStandardMaterial({ color: 0x00ff55, emissive: 0x00aa33, emissiveIntensity: .7, roughness: 0.6, metalness: 0.1 });
      const greenRadius = 0.3125 / 12 / 2; // 5/16" diameter
      const outerPairs = [[20,11],[11,3],[3,20],[22,2],[2,9],[9,22],[16,8],[8,0],[0,16],[18,1],[1,10],[10,18],[7,15],[15,21],[21,7],[13,6],[6,23],[23,13],[4,12],[12,17],[17,4],[14,5],[5,19],[19,14],[3,18],[9,20],[0,22],[10,16],[1,14],[11,7],[2,13],[8,4],[17,6],[12,19],[5,21],[15,23]];
      const extraPairs = [[3,27],[20,44],[11,35],[9,33],[22,46],[2,26],[0,24],[16,40],[8,32],[10,34],[18,42],[1,25],[13,37],[23,47],[6,30],[7,31],[21,45],[15,39],[14,38],[19,43],[5,29],[17,41],[12,36],[4,28]];
      const innerPairs = outerPairs.map(([i, j]) => [i + 24, j + 24]);
      const pairs = [...outerPairs, ...innerPairs, ...extraPairs];
      for (const [i, j] of pairs) {
        const a = poleEndpoints[i].position;
        const b = poleEndpoints[j].position;
        const dir = new THREE.Vector3().subVectors(b, a);
        const length = dir.length();
        const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
        const geo = new THREE.CylinderGeometry(greenRadius, greenRadius, length, 16);
        const mesh = new THREE.Mesh(geo, greenMat);
        mesh.position.copy(mid);
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
        scene.add(mesh);
      }
    }

    let labelsVisible = false;
    endpointLabels.forEach(s => s.visible = false);

    let windVisible = false;

    document.getElementById('btn-labels').addEventListener('click', () => {
      labelsVisible = !labelsVisible;
      endpointLabels.forEach(s => s.visible = labelsVisible);
      updateButtons();
    });
    document.getElementById('btn-dust').addEventListener('click', () => {
      windVisible = !windVisible;
      windParticles.visible = windVisible;
      updateButtons();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'p' || e.key === 'P') {
        labelsVisible = !labelsVisible;
        endpointLabels.forEach(s => s.visible = labelsVisible);
        updateButtons();
      }
      if (e.key === 'd' || e.key === 'D') {
        windVisible = !windVisible;
        windParticles.visible = windVisible;
        updateButtons();
      }
    });

    // --- Ground plane ---
    const groundGeometry = new THREE.PlaneGeometry(75, 75);
    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    new THREE.TextureLoader().load('GroundTexture.jpg', (tex) => {
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(12, 12);
      ground.material.map = tex;
      ground.material.color.set(0xffffff);
      ground.material.needsUpdate = true;
    });

    // --- Blowing particles ---
    const PARTICLE_COUNT = 4000;
    const WIND_AREA = 25;  // half-extent of spawn box in X/Z
    const WIND_HEIGHT = 12;
    const windPositions  = new Float32Array(PARTICLE_COUNT * 3);
    const windVelocities = new Float32Array(PARTICLE_COUNT * 3);
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      windPositions[i*3]   = (Math.random() - 0.5) * WIND_AREA * 2;
      windPositions[i*3+1] = Math.random() * WIND_HEIGHT;
      windPositions[i*3+2] = (Math.random() - 0.5) * WIND_AREA * 2;
      windVelocities[i*3]   = 4.0 + Math.random() * 8.0;          // primary wind (X)
      windVelocities[i*3+1] = (Math.random() - 0.5) * 0.3;        // slight vertical drift
      windVelocities[i*3+2] = (Math.random() - 0.5) * 0.8;        // slight lateral drift
    }
    const windGeo = new THREE.BufferGeometry();
    windGeo.setAttribute('position', new THREE.BufferAttribute(windPositions, 3));
    const windMat = new THREE.PointsMaterial({ color: 0xddccaa, size: 0.04, transparent: true, opacity: 0.5, sizeAttenuation: true });
    const windParticles = new THREE.Points(windGeo, windMat);
    windParticles.visible = false;
    scene.add(windParticles);

    // --- Animation ---
    const color = new THREE.Color();
    const darkColor = new THREE.Color(0x050505);
    // --- Smooth random parameter system ---
    // Each parameter smoothly interpolates between random target values
    function createSmoothParam(min, max, minDuration, maxDuration) {
      const range = max - min;
      const startVal = min + Math.random() * range;
      return {
        min, max,
        minDuration, maxDuration,
        currentVal: startVal,
        fromVal: startVal,
        toVal: min + Math.random() * range,
        transitionStart: 0,
        transitionDuration: minDuration + Math.random() * (maxDuration - minDuration),
      };
    }

    function updateSmoothParam(param, t) {
      let elapsed = t - param.transitionStart;
      let progress = Math.min(elapsed / param.transitionDuration, 1);
      // Smoothstep for easing
      progress = progress * progress * (3 - 2 * progress);
      param.currentVal = param.fromVal + (param.toVal - param.fromVal) * progress;

      if (elapsed >= param.transitionDuration) {
        param.fromVal = param.toVal;
        param.toVal = param.min + Math.random() * (param.max - param.min);
        param.transitionStart = t;
        param.transitionDuration = param.minDuration + Math.random() * (param.maxDuration - param.minDuration);
      }
      return param.currentVal;
    }

    const paramSpeed = createSmoothParam(5, 30, 2, 6);
    const paramTailLength = createSmoothParam(2, 15, 2, 7);
    const paramWindDensity = createSmoothParam(0.05, 1.0, 3, 10);
    const paramGreenEmissive = createSmoothParam(0, 0.8, 1, 10);

    // Build a set of all sphere indices that belong to any base direction, for quick lookup
    const baseDirs = ['vertical', 'leftright', 'frontback'];
    const allGroupSpheres = new Map(); // sphereIndex -> { baseDir, posInPole, cubeSet }
    for (const [cubeSet, dg] of [['outer', outerDirGroups], ['inner', innerDirGroups]]) {
      for (const baseDir of baseDirs) {
        const group = dg[baseDir];
        for (let p = 0; p < group.poles.length; p++) {
          for (let j = 0; j < group.poles[p].length; j++) {
            allGroupSpheres.set(group.poles[p][j], { baseDir, posInPole: j, cubeSet });
          }
        }
      }
    }

    function getBrightness(posInPole, particlePos, tailLength, lightsPerEdge) {
      let dist = particlePos - posInPole;
      if (dist < 0) dist += lightsPerEdge;
      if (dist > lightsPerEdge / 2) dist = lightsPerEdge - dist;
      if (dist < 1) return 1.0;
      if (dist <= tailLength) return 1.0 - (dist / tailLength);
      return 0;
    }



    // Each group gets a sine-wave weight offset by 1/N of the cycle.
    // phaseOffset shifts the cycle so inner/outer cubes are out of sync.
    function getGroupWeight(groupIdx, t, phaseOffset) {
      const cyclePeriod = SWITCH_INTERVAL * groupNames.length;
      const angle = (t / cyclePeriod) * Math.PI * 2 + (groupIdx / groupNames.length) * Math.PI * 2 + phaseOffset;
      return Math.max(0, Math.sin(angle));
    }

    // Inner cube cycle is offset by ~2/3 of a full rotation so it leads the outer by one step
    const INNER_PHASE_OFFSET = (2 / 3) * Math.PI * 2;

    let outerParticlePos = 0;
    let innerParticlePos = 0;
    let lastTime = null;

    function animate(time) {
      requestAnimationFrame(animate);

      const t = time * 0.001; // seconds
      const dt = lastTime === null ? 0 : t - lastTime;
      lastTime = t;

      // Update smooth parameters
      const currentSpeed = updateSmoothParam(paramSpeed, t);
      const currentTailLength = updateSmoothParam(paramTailLength, t);

      // Integrate position so speed changes never cause backward jumps
      outerParticlePos = (outerParticlePos + currentSpeed * dt) % OUTER_LIGHTS_PER_EDGE;
      innerParticlePos = (innerParticlePos + currentSpeed * dt) % INNER_LIGHTS_PER_EDGE;

      // Separate weights for outer and inner cubes (one weight per groupDef entry)
      const outerWeights = groupDefs.map((_, idx) => getGroupWeight(idx, t, 0));
      const innerWeights = groupDefs.map((_, idx) => getGroupWeight(idx, t, INNER_PHASE_OFFSET));

      // Hues: evenly spaced, outer and inner offset by 0.5
      const outerHues = groupDefs.map((_, idx) => (t * 0.05 + idx / groupDefs.length) % 1);
      const innerHues = groupDefs.map((_, idx) => (t * 0.05 + idx / groupDefs.length + 0.5) % 1);

      // Update all light spheres — accumulate contributions from all groups sharing this baseDir
      const tempColor = new THREE.Color();
      for (let i = 0; i < lightSpheres.length; i++) {
        const info = allGroupSpheres.get(i);
        if (!info) { lightSpheres[i].material.opacity = 0; continue; }

        const isInner = info.cubeSet === 'inner';
        const lpe = isInner ? INNER_LIGHTS_PER_EDGE : OUTER_LIGHTS_PER_EDGE;
        const ppos = isInner ? innerParticlePos : outerParticlePos;
        let lr = 0, lg = 0, lb = 0;

        for (let gi = 0; gi < groupDefs.length; gi++) {
          const def = groupDefs[gi];
          if (def.baseDir !== info.baseDir) continue;
          const weight = isInner ? innerWeights[gi] : outerWeights[gi];
          if (weight <= 0.001) continue;
          const effPos = def.reversed ? (lpe - 1 - info.posInPole) : info.posInPole;
          const brightness = getBrightness(effPos, ppos, currentTailLength, lpe) * weight;
          const hue = isInner ? innerHues[gi] : outerHues[gi];
          tempColor.setHSL(hue, 1.0, brightness * 0.5);
          lr += tempColor.r; lg += tempColor.g; lb += tempColor.b;
        }

        const lum = lr * 0.299 + lg * 0.587 + lb * 0.114;
        lightSpheres[i].material.opacity = lum < 0.005 ? 0 : Math.min(lum * 4, 1);
        lightSpheres[i].material.color.setRGB(
          Math.min(lr, 1), Math.min(lg, 1), Math.min(lb, 1)
        );
      }

      // Update real PointLights per pole
      for (const [cubeSet, dg, weights, hues] of [
        ['outer', outerDirGroups, outerWeights, outerHues],
        ['inner', innerDirGroups, innerWeights, innerHues],
      ]) {
        const lpe = cubeSet === 'inner' ? INNER_LIGHTS_PER_EDGE : OUTER_LIGHTS_PER_EDGE;
        const ppos = cubeSet === 'inner' ? innerParticlePos : outerParticlePos;
        for (let gi = 0; gi < groupDefs.length; gi++) {
          const def = groupDefs[gi];
          const group = dg[def.baseDir];
          const weight = weights[gi];
          for (let p = 0; p < group.realLightPoles.length; p++) {
            for (const { light, posInPole } of group.realLightPoles[p]) {
              if (weight > 0.001) {
                const effPos = def.reversed ? (lpe - 1 - posInPole) : posInPole;
                const brightness = getBrightness(effPos, ppos, currentTailLength, lpe) * weight;
                color.setHSL(hues[gi], 1.0, 0.5);
                light.color.copy(color);
                light.intensity = brightness * 1;
              } else {
                light.intensity = 0;
              }
            }
          }
        }
      }

      // Animate blowing particles
      windGeo.setDrawRange(0, Math.floor(updateSmoothParam(paramWindDensity, t) * PARTICLE_COUNT));
      const currentGreenEmissive = updateSmoothParam(paramGreenEmissive, t);
      greenMat.emissiveIntensity = currentGreenEmissive;

      // Update overlay text
      const overlay = document.getElementById('overlay');
      overlay.innerHTML =
        `speed:    ${currentSpeed.toFixed(1).padStart(5)}  [${paramSpeed.min}–${paramSpeed.max}]<br>` +
        `tail:     ${currentTailLength.toFixed(1).padStart(5)}  [${paramTailLength.min}–${paramTailLength.max}]<br>` +
        `UV light: ${currentGreenEmissive.toFixed(2).padStart(5)}  [${paramGreenEmissive.min}–${paramGreenEmissive.max}]`;
      const wpos = windGeo.attributes.position.array;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        wpos[i*3]   += windVelocities[i*3]   * dt;
        wpos[i*3+1] += windVelocities[i*3+1] * dt;
        wpos[i*3+2] += windVelocities[i*3+2] * dt;
        if (wpos[i*3] >  WIND_AREA) wpos[i*3] -= WIND_AREA * 2;
        if (wpos[i*3] < -WIND_AREA) wpos[i*3] += WIND_AREA * 2;
        if (wpos[i*3+1] < 0)           wpos[i*3+1] = WIND_HEIGHT;
        if (wpos[i*3+1] > WIND_HEIGHT)  wpos[i*3+1] = 0;
        if (wpos[i*3+2] >  WIND_AREA) wpos[i*3+2] -= WIND_AREA * 2;
        if (wpos[i*3+2] < -WIND_AREA) wpos[i*3+2] += WIND_AREA * 2;
      }
      windGeo.attributes.position.needsUpdate = true;

      controls.update();
      composer.render();
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
